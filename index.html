<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pure Base-100 System</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #151515 0%, #000000 100%);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 15px;
        }

        .clock-casing {
            background: linear-gradient(135deg, #2b2b2b 0%, #0d0d0d 100%);
            border-radius: 35px;
            padding: 40px 25px 30px 25px;
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.95),
                inset 0 4px 10px rgba(255, 255, 255, 0.12),
                inset 0 -5px 20px rgba(0, 0, 0, 0.8);
            border: 1px solid #3a3a3a;
            width: 100%;
            max-width: 540px;
            position: relative;
            display: flex;
            justify-content: center;
            min-height: 220px;
        }

        .snooze-btn {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 14px;
            background: linear-gradient(to bottom, #222, #111);
            border-radius: 8px 8px 0 0;
            border: 1px solid #333;
            border-bottom: none;
            box-shadow: 
                inset 0 2px 3px rgba(255,255,255,0.1),
                0 -2px 10px rgba(0,0,0,0.5);
        }

        .screen {
            background: radial-gradient(circle at 50% 50%, #0f0000 0%, #000000 100%);
            border-radius: 18px;
            padding: 30px 25px 20px 25px;
            width: 100%;
            box-shadow: 
                inset 0 0 40px rgba(0, 0, 0, 1),
                0 2px 2px rgba(255, 255, 255, 0.08);
            border: 2px solid #050000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            overflow: hidden; 
        }

        .screen::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right, 
                rgba(255, 255, 255, 0.04) 0%, 
                rgba(255, 255, 255, 0.01) 40%, 
                rgba(255, 255, 255, 0) 50%
            );
            transform: rotate(30deg);
            pointer-events: none; 
        }

        #statusText {
            font-size: 1.1rem;
            color: #ff4444;
            text-shadow: 0 0 10px #ff0000;
            animation: pulseGlow 1.5s infinite alternate;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.6;
            z-index: 2;
        }

        /* DIGITAL CLOCK STYLES */
        .time-display {
            display: none; 
            align-items: center;
            justify-content: center;
            width: 100%;
            z-index: 2; 
        }

        .main-digits {
            font-size: 6rem;
            line-height: 1;
            display: flex;
            align-items: center;
            letter-spacing: 3px;
            color: #fff2f2; 
            text-shadow: 
                0 0 10px #ff0000, 
                0 0 20px #ff0000, 
                0 0 40px #d60000, 
                0 0 80px #aa0000;
        }

        .colon {
            margin: 0 6px;
            color: #ffcccc;
            animation: blinker 1s infinite;
            transform: translateY(-5px);
            text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            margin-left: 20px;
            height: 5rem;
            padding-bottom: 2px;
        }

        .ampm-indicator {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ff6666;
            text-align: right;
            letter-spacing: 3px;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #aa0000;
        }

        .sec-digits {
            font-size: 3rem;
            line-height: 1;
            color: #ffe6e6;
            text-shadow: 
                0 0 8px #ff0000, 
                0 0 15px #d60000,
                0 0 30px #aa0000;
        }

        /* METRIC CALENDAR STYLES */
        .calendar-panel {
            display: none;
            width: 100%;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px dashed rgba(255, 0, 0, 0.2);
            justify-content: space-between;
            z-index: 2;
        }

        .cal-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 25%;
        }

        .cal-label {
            font-size: 0.7rem;
            color: #aa4444;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .cal-val {
            font-size: 1.5rem;
            color: #ff8888;
            text-shadow: 0 0 10px #ff0000;
            letter-spacing: 2px;
        }

        /* STANDARD EARTH DATE STYLES */
        .standard-date-panel {
            display: none;
            width: 100%;
            margin-top: 15px;
            text-align: center;
            z-index: 2;
        }

        .standard-date-text {
            font-size: 0.8rem;
            color: #662222; /* Dimmed so it doesn't distract from the metric clock */
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.3);
        }

        @keyframes pulseGlow {
            from { opacity: 0.6; text-shadow: 0 0 5px #ff0000; }
            to { opacity: 1; text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000; }
        }

        @keyframes blinker {
            50% { opacity: 0.05; text-shadow: none; }
        }

        @media (max-width: 450px) {
            .clock-casing { padding: 30px 15px 20px 15px; border-radius: 25px; }
            .screen { padding: 25px 15px 15px 15px; }
            .main-digits { font-size: 4.5rem; letter-spacing: 1px; }
            .side-panel { height: 3.8rem; margin-left: 12px; }
            .ampm-indicator { font-size: 1.1rem; }
            .sec-digits { font-size: 2.3rem; }
            .colon { margin: 0 2px; transform: translateY(-3px); }
            
            .calendar-panel { margin-top: 20px; padding-top: 15px; }
            .cal-label { font-size: 0.6rem; letter-spacing: 1px; }
            .cal-val { font-size: 1.2rem; }
            .standard-date-text { font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <div class="clock-casing">
        <div class="snooze-btn"></div>
        <div class="screen">
            <div id="statusText">Pinging location...</div>
            
            <div id="timeDisplay" class="time-display">
                <div class="main-digits">
                    <span id="hours">00</span>
                    <span class="colon">:</span>
                    <span id="minutes">00</span>
                </div>
                <div class="side-panel">
                    <div id="ampm" class="ampm-indicator">AM</div>
                    <div class="sec-digits">
                        <span id="seconds">00</span>
                    </div>
                </div>
            </div>

            <div class="calendar-panel" id="calendarPanel">
                <div class="cal-item">
                    <span class="cal-label">YEAR</span>
                    <span id="cYear" class="cal-val">0000</span>
                </div>
                <div class="cal-item">
                    <span class="cal-label">MONTH</span>
                    <span id="cMonth" class="cal-val">00</span>
                </div>
                <div class="cal-item">
                    <span class="cal-label">WEEK</span>
                    <span id="cWeek" class="cal-val">00</span>
                </div>
                <div class="cal-item">
                    <span class="cal-label">DAY</span>
                    <span id="cDay" class="cal-val">00</span>
                </div>
            </div>

            <div class="standard-date-panel" id="standardDatePanel">
                <span id="standardDateText" class="standard-date-text">JAN 01, 2026</span>
            </div>

        </div>
    </div>

    <script>
        const statusText = document.getElementById('statusText');
        const timeDisplay = document.getElementById('timeDisplay');
        const calendarPanel = document.getElementById('calendarPanel');
        const standardDatePanel = document.getElementById('standardDatePanel');
        
        const hEl = document.getElementById('hours');
        const mEl = document.getElementById('minutes');
        const sEl = document.getElementById('seconds');
        const ampmEl = document.getElementById('ampm');

        const cYearEl = document.getElementById('cYear');
        const cMonthEl = document.getElementById('cMonth');
        const cWeekEl = document.getElementById('cWeek');
        const cDayEl = document.getElementById('cDay');
        const standardDateTextEl = document.getElementById('standardDateText');

        let currentDayStart = 0;
        let customMsPerTick = 0;

        function getYYYYMMDD(dateObj) {
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start + (start.getTimezoneOffset() - date.getTimezoneOffset()) * 60 * 1000;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        function initGPS() {
            if (!navigator.geolocation) {
                statusText.innerText = "ERROR: GPS Hardware Not Found";
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                fetchSolarData, 
                (error) => {
                    let reason = "";
                    if(error.code === 1) reason = "PERMISSION DENIED";
                    else if(error.code === 2) reason = "POSITION UNAVAILABLE";
                    else if(error.code === 3) reason = "TIMEOUT (Took too long)";
                    
                    statusText.innerHTML = `ERROR: ${reason}<br><br>Pull down your phone's top menu and ensure the main <strong>Location/GPS toggle</strong> is turned ON, then refresh.`;
                }, 
                { enableHighAccuracy: false, timeout: 30000, maximumAge: Infinity }
            );
        }

        async function fetchSolarData(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            statusText.innerText = "Location secured. Calculating sunrise...";

            const today = new Date();
            const yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
            const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);

            try {
                const urls = [
                    `https://api.sunrisesunset.io/json?lat=${lat}&lng=${lng}&date=${getYYYYMMDD(yesterday)}&formatted=0`,
                    `https://api.sunrisesunset.io/json?lat=${lat}&lng=${lng}&date=today&formatted=0`,
                    `https://api.sunrisesunset.io/json?lat=${lat}&lng=${lng}&date=tomorrow&formatted=0`
                ];

                const responses = await Promise.all(urls.map(url => fetch(url)));
                const data = await Promise.all(responses.map(res => res.json()));

                const srYesterday = new Date(data[0].results.sunrise).getTime();
                const srToday = new Date(data[1].results.sunrise).getTime();
                const srTomorrow = new Date(data[2].results.sunrise).getTime();

                const now = Date.now();
                let nextDayStart;

                if (now >= srToday && now < srTomorrow) {
                    currentDayStart = srToday;
                    nextDayStart = srTomorrow;
                } else if (now < srToday) {
                    currentDayStart = srYesterday;
                    nextDayStart = srToday;
                } else {
                    currentDayStart = srToday;
                    nextDayStart = srTomorrow;
                }

                const standardMsPerDay = nextDayStart - currentDayStart;
                
                customMsPerTick = standardMsPerDay / 1000000;

                statusText.style.display = "none";
                timeDisplay.style.display = "flex";
                calendarPanel.style.display = "flex"; 
                standardDatePanel.style.display = "block"; // Reveals standard date

                requestAnimationFrame(updateClock);

            } catch (err) {
                statusText.innerText = "Network Error. Cannot reach solar server.";
                console.error(err);
            }
        }

        function updateClock() {
            const nowObj = new Date();
            const now = nowObj.getTime();
            
            let elapsedMs = now - currentDayStart;
            if (elapsedMs < 0) elapsedMs = 0;
            
            let customTicks = Math.floor(elapsedMs / customMsPerTick);
            customTicks = customTicks % 1000000; 

            const s = customTicks % 100;
            const m = Math.floor(customTicks / 100) % 100;
            const h = Math.floor(customTicks / 10000); 

            ampmEl.innerText = h < 50 ? "AM" : "PM";

            hEl.innerText = String(h).padStart(2, '0');
            mEl.innerText = String(m).padStart(2, '0');
            sEl.innerText = String(s).padStart(2, '0');

            const dayOfYear = getDayOfYear(nowObj);
            
            const metricYear = nowObj.getFullYear();
            const metricMonth = Math.ceil(dayOfYear / 100);
            const metricDay = (dayOfYear - 1) % 100 + 1; 
            const metricWeek = Math.ceil(metricDay / 10); 
            
            cYearEl.innerText = metricYear;
            cMonthEl.innerText = String(metricMonth).padStart(2, '0');
            cWeekEl.innerText = String(metricWeek).padStart(2, '0');
            cDayEl.innerText = String(metricDay).padStart(2, '0');

            // Format and display standard Earth Date
            const options = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            standardDateTextEl.innerText = nowObj.toLocaleDateString('en-US', options).toUpperCase();

            requestAnimationFrame(updateClock);
        }

        initGPS();
    </script>
</body>
</html>
